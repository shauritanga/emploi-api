name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            source /root/.nvm/nvm.sh
            git config --global --add safe.directory /var/www/emploi-api
            cd /var/www/emploi-api
            git pull origin main
            npm install
            npx prisma migrate deploy
            npm run build
            su - emploi -c 'source /home/emploi/.nvm/nvm.sh && pm2 reload emploi-api'
